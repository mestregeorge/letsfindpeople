# supabase/config.toml
# Supabase CLI project configuration.
# https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Storage buckets are managed via the Supabase dashboard or migrations.
# Required bucket: "profile-pictures" (public)

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://letsfindpeople.com"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions]
# Edge Functions are in supabase/functions/<name>/index.ts
# Deploy all with: supabase functions deploy
# Set secrets with: supabase secrets set KEY=value
#
# Required secrets for production:
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_ID

[functions.stripe-webhook]
verify_jwt = false
